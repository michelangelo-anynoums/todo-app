<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Не знайдено</title>
    <link rel="icon" href="favicon.png" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            user-select: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            align-content: center;
            height: 100vh;
            background-color: var(--background-color);
        }

        body {
            background: linear-gradient(-45deg, #191540, #1a143c, #0c0f25, #221744);
            background-size: 400% 400%;
            animation: gradientMove 10s ease-in-out infinite;
            margin: 0;
        }

        @keyframes gradientMove {
        0% {
            background-position: 0% 50%;
        }
        50% {
            background-position: 100% 50%;
        }
        100% {
            background-position: 0% 50%;
        }}

        div {
            display: flex;
            justify-content: center;
            align-items: center;
            color: whitesmoke;
            padding: 45px;
            width: 450px;
            height: 250px;
            background-color: #282166;
            border-radius: 24px;
            font-size: xx-large;
        }
    </style>
</head>
<body>
    <div>404 - Не знайдено</div>
</body>
</html>
